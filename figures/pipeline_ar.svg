<svg xmlns="http://www.w3.org/2000/svg" width="960" height="690" viewBox="0 0 960 690" direction="rtl" font-family="'Noto Naskh Arabic', 'Geeza Pro', 'Segoe UI', Tahoma, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="690" fill="#ffffff"/>

  <!-- 1. الاستقبال -->
  <rect x="330" y="24" width="300" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="480" y="51" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">استقبال طلب المشروع</text>
  <text x="480" y="73" text-anchor="middle" font-size="13" fill="#475569">(إخفاء الهوية + التعقيم)</text>

  <line x1="480" y1="88" x2="480" y2="136" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. البوابة -->
  <rect x="330" y="140" width="300" height="64" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="480" y="167" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">ترشيح المخاطر الحرجة</text>
  <text x="480" y="189" text-anchor="middle" font-size="13" fill="#475569">(بوابة العيوب القاتلة)</text>

  <!-- فرع الرفض (يسار) -->
  <line x1="330" y1="172" x2="244" y2="172" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="287" y="164" text-anchor="middle" font-size="12" fill="#b91c1c">خطر مرتفع / عيب قاتل</text>
  <rect x="40" y="140" width="200" height="64" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="140" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">رفض</text>
  <text x="140" y="189" text-anchor="middle" font-size="12" fill="#7f1d1d">(+ تغذية راجعة بنّاءة)</text>

  <!-- اجتياز البوابة + التفرع -->
  <line x1="480" y1="204" x2="480" y2="248" stroke="#334155" stroke-width="1.5"/>
  <text x="468" y="232" text-anchor="start" font-size="12" fill="#475569">[يجتاز البوابة]</text>
  <line x1="180" y1="248" x2="780" y2="248" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="248" x2="180" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="248" x2="480" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="248" x2="780" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. الوكلاء (الوكيل 1 في أقصى اليمين) -->
  <rect x="660" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="780" y="313" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">الوكيل 1</text>
  <text x="780" y="337" text-anchor="middle" font-size="13" fill="#475569">العلم والابتكار</text>

  <rect x="360" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="480" y="313" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">الوكيل 2</text>
  <text x="480" y="337" text-anchor="middle" font-size="13" fill="#475569">التنفيذ والهندسة</text>

  <rect x="60" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="180" y="313" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">الوكيل 3</text>
  <text x="180" y="337" text-anchor="middle" font-size="13" fill="#475569">الأثر والسوق</text>

  <!-- الدمج -->
  <line x1="180" y1="368" x2="180" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="480" y1="368" x2="480" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="780" y1="368" x2="780" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="408" x2="780" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="480" y1="408" x2="480" y2="436" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="468" y="430" text-anchor="start" font-size="12" fill="#475569">(الدرجات، المسوّغات، الثقة)</text>

  <!-- 4. الوكيل المنسّق -->
  <rect x="330" y="440" width="300" height="88" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="473" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">الوكيل المنسّق</text>
  <text x="480" y="497" text-anchor="middle" font-size="13" fill="#475569">(حل التعارضات، معايرة الدفعات)</text>

  <!-- فرع المراجعة البشرية (يسار) -->
  <line x1="330" y1="484" x2="244" y2="484" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="287" y="476" text-anchor="middle" font-size="12" fill="#b45309">ثقة منخفضة</text>
  <rect x="40" y="452" width="200" height="64" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
  <text x="140" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">مراجعة بشرية</text>

  <line x1="480" y1="528" x2="480" y2="572" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. المقياس النهائي -->
  <rect x="330" y="576" width="300" height="76" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="480" y="602" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">المقياس النهائي المتوازن</text>
  <text x="480" y="626" text-anchor="middle" font-size="13" fill="#475569">+ التقرير</text>

  <line x1="330" y1="614" x2="244" y2="614" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="236" y="608" text-anchor="start" font-size="13" fill="#334155">قائمة مختصرة مرتّبة</text>
  <text x="236" y="626" text-anchor="start" font-size="13" fill="#334155">للجنة البشرية</text>
</svg>
