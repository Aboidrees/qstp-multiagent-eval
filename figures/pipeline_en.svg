<svg xmlns="http://www.w3.org/2000/svg" width="960" height="690" viewBox="0 0 960 690" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="690" fill="#ffffff"/>

  <!-- 1. Ingest -->
  <rect x="330" y="24" width="300" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="480" y="51" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Project Submission Ingest</text>
  <text x="480" y="72" text-anchor="middle" font-size="13" fill="#475569">(Anonymize + Sanitize)</text>

  <line x1="480" y1="88" x2="480" y2="136" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Gate -->
  <rect x="330" y="140" width="300" height="64" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="480" y="167" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Critical Risk Filtering</text>
  <text x="480" y="188" text-anchor="middle" font-size="13" fill="#475569">(Showstopper Gate)</text>

  <!-- Reject branch -->
  <line x1="630" y1="172" x2="716" y2="172" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="673" y="164" text-anchor="middle" font-size="12" fill="#b91c1c">High risk / fatal flaw</text>
  <rect x="720" y="140" width="200" height="64" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="820" y="167" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">REJECT</text>
  <text x="820" y="188" text-anchor="middle" font-size="12" fill="#7f1d1d">(+ constructive feedback)</text>

  <!-- Pass gate down + split -->
  <line x1="480" y1="204" x2="480" y2="248" stroke="#334155" stroke-width="1.5"/>
  <text x="492" y="232" font-size="12" fill="#475569">[Passes Gate]</text>
  <line x1="180" y1="248" x2="780" y2="248" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="248" x2="180" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="248" x2="480" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="248" x2="780" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Agents -->
  <rect x="60" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="180" y="313" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Agent 1</text>
  <text x="180" y="336" text-anchor="middle" font-size="13" fill="#475569">Science &amp; Innovation</text>

  <rect x="360" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="480" y="313" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Agent 2</text>
  <text x="480" y="336" text-anchor="middle" font-size="13" fill="#475569">Exec &amp; Engineering</text>

  <rect x="660" y="280" width="240" height="88" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="780" y="313" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Agent 3</text>
  <text x="780" y="336" text-anchor="middle" font-size="13" fill="#475569">Impact &amp; Market</text>

  <!-- Merge -->
  <line x1="180" y1="368" x2="180" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="480" y1="368" x2="480" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="780" y1="368" x2="780" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="408" x2="780" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="480" y1="408" x2="480" y2="436" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="492" y="430" font-size="12" fill="#475569">(Scores, Rationales, Confidence)</text>

  <!-- 4. Coordinator -->
  <rect x="330" y="440" width="300" height="88" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="473" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Coordinator Agent</text>
  <text x="480" y="496" text-anchor="middle" font-size="13" fill="#475569">(Conflict Resolve, Batch Normalize)</text>

  <!-- Human review branch -->
  <line x1="630" y1="484" x2="716" y2="484" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="673" y="476" text-anchor="middle" font-size="12" fill="#b45309">Low confidence</text>
  <rect x="720" y="452" width="200" height="64" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
  <text x="820" y="490" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">HUMAN REVIEW</text>

  <line x1="480" y1="528" x2="480" y2="572" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Final -->
  <rect x="330" y="576" width="300" height="76" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="480" y="607" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Final Balanced Metric + Report</text>

  <line x1="630" y1="614" x2="716" y2="614" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="724" y="608" font-size="13" fill="#334155">Ranked shortlist for</text>
  <text x="724" y="626" font-size="13" fill="#334155">the human panel</text>
</svg>
